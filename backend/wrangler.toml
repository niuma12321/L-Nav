# ============================================
# Y-Nav Backend API - Cloudflare Workers
# 前后端分离架构 - 纯 API 服务
# ============================================

name = "y-nav-api"
main = "index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# ---------- 路由配置 ----------
routes = [
  { pattern = "api.678870.xyz/*", zone_name = "678870.xyz" },
  { pattern = "678870.xyz/api/*", zone_name = "678870.xyz" }
]

# ---------- KV 命名空间 ----------
[[kv_namespaces]]
binding = "YNAV_WORKER_KV"
id = "43e6854cf0354bf5970054b899dde7d9"
preview_id = "43e6854cf0354bf5970054b899dde7d9"

# ---------- D1 数据库 ----------
[[d1_databases]]
binding = "YNAV_D1_DB"
database_name = "ynav-db"
database_id = "f6e0f916-2855-481f-b6dd-09790f377811"

# ---------- 环境变量 ----------
[vars]
APP_NAME = "Y-Nav"
APP_VERSION = "0.1.6"
ENVIRONMENT = "production"
ENABLE_D1_SYNC = "true"
SYNC_API_VERSION = "v1"
