# ============================================
# Y-Nav Cloudflare Workers 部署配置
# 项目地址: https://github.com/niuma12321/L-Nav
# ============================================

# ---------- 基础配置 ----------
name = "home"  # 🔧 修改为 CI 期望的名称
main = "worker/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# ---------- 性能优化配置 ----------
minify = true

# ---------- 静态资源配置 (Workers Sites) ----------
[site]
bucket = "./dist"

# ---------- KV 命名空间绑定 ----------
# 🔧 已更新为正确的 KV ID
[[kv_namespaces]]
binding = "YNAV_WORKER_KV"
id = "43e6854cf0354bf5970054b899dde7d9"

# ---------- 环境变量（非敏感配置）----------
[vars]
APP_NAME = "Y-Nav"
APP_VERSION = "1.0.0"
ENABLE_SHORT_LINKS = "true"
ENABLE_ANALYTICS = "true"
ENABLE_BACKUPS = "true"
BACKUP_RETENTION_DAYS = "30"

# ---------- 开发环境配置 ----------
[env.dev]
name = "y-nav-dev"
compatibility_date = "2025-03-01"

[env.dev.vars]
ENVIRONMENT = "development"
DEBUG = "true"

# ---------- 预览环境配置 ----------
[env.preview]
name = "y-nav-preview"
compatibility_date = "2025-03-01"

[env.preview.vars]
ENVIRONMENT = "preview"
DEBUG = "true"

# ---------- 生产环境配置 ----------
[env.production]
name = "home"
compatibility_date = "2025-03-01"

[env.production.vars]
ENVIRONMENT = "production"
DEBUG = "false"

# ============================================
# 🔐 敏感配置（请在 Cloudflare Dashboard 设置）
# ============================================
# 以下变量不应提交到版本控制，请在 Cloudflare Dashboard -> Workers & Pages -> 设置 -> 变量 中添加：
#
# 1. SYNC_PASSWORD_HASH (必填)
#    - 说明：同步密码的 SHA-256 哈希值
#
# 2. VIEW_PASSWORD_HASH (可选)
#    - 说明：只读密码的 SHA-256 哈希值
#
# ============================================
# 📦 部署步骤
# ============================================
#
# 1. 构建项目
#    npm run build
#
# 2. 部署到生产环境
#    提交代码触发 CI 自动部署
#
# 3. 本地预览
#    wrangler dev
#
# ============================================
