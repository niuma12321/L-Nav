# ============================================
# Y-Nav Cloudflare Workers 部署配置
# 项目地址: https://github.com/niuma12321/L-Nav
# ============================================

# ---------- 基础配置 ----------
name = "home"
main = "worker/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# ---------- 自定义域名配置 ----------
# ⚠️ 注意：使用 zone-based 路由模式（不是 custom_domain）
# 这样可以在 wrangler.toml 中直接配置，无需在 Dashboard 手动设置
routes = [
  { pattern = "678870.xyz/*", zone_name = "678870.xyz" },
  { pattern = "www.678870.xyz/*", zone_name = "678870.xyz" }
]
# 或者如果想让 Workers 自动分配子域名，可以不配置 routes
# 然后在 Dashboard -> Workers & Pages -> home -> 触发器 -> 添加自定义域
# 手动添加 678870.xyz

# ---------- 性能优化配置 ----------
minify = true

# ---------- 静态资源配置 (Workers Sites) ----------
[site]
bucket = "./dist"

# ---------- KV 命名空间绑定 ----------
[[kv_namespaces]]
binding = "YNAV_WORKER_KV"
id = "43e6854cf0354bf5970054b899dde7d9"
preview_id = "43e6854cf0354bf5970054b899dde7d9"

# ---------- D1 数据库绑定 ----------
[[d1_databases]]
binding = "YNAV_D1_DB"
database_name = "ynav-db"
database_id = "f6e0f916-2855-481f-b6dd-09790f377811"

# ---------- R2 对象存储绑定 ----------
[[r2_buckets]]
binding = "YNAV_R2_BUCKET"
bucket_name = "ynav-storage"

# ---------- 环境变量（非敏感配置）----------
[vars]
APP_NAME = "Y-Nav"
APP_VERSION = "2.0.0"
DOMAIN = "678870.xyz"
ENVIRONMENT = "production"
R2_S3_ENDPOINT = "https://35e396384ed3981abb800b25f550a695.r2.cloudflarestorage.com/ynav-storage"

# 功能开关
ENABLE_SHORT_LINKS = "true"
ENABLE_ANALYTICS = "true"
ENABLE_BACKUPS = "true"
ENABLE_D1_SYNC = "true"
ENABLE_R2_STORAGE = "true"

# 备份和同步配置
BACKUP_RETENTION_DAYS = "30"
SYNC_API_VERSION = "v1"
MAX_BACKUP_SIZE_MB = "50"

# 安全设置
RATE_LIMIT_MAX_REQUESTS = "100"
RATE_LIMIT_WINDOW_SECONDS = "60"

# ---------- 开发环境配置 ----------
[env.dev]
name = "y-nav-dev"
compatibility_date = "2025-03-01"

# 开发环境使用本地绑定
[[env.dev.kv_namespaces]]
binding = "YNAV_WORKER_KV"
id = "43e6854cf0354bf5970054b899dde7d9"

[[env.dev.d1_databases]]
binding = "YNAV_D1_DB"
database_name = "ynav-db"
database_id = "f6e0f916-2855-481f-b6dd-09790f377811"

[[env.dev.r2_buckets]]
binding = "YNAV_R2_BUCKET"
bucket_name = "ynav-storage"

[env.dev.vars]
ENVIRONMENT = "development"
DEBUG = "true"
APP_NAME = "Y-Nav"
APP_VERSION = "2.0.0"
DOMAIN = "dev.678870.xyz"
R2_S3_ENDPOINT = "https://35e396384ed3981abb800b25f550a695.r2.cloudflarestorage.com/ynav-storage"
ENABLE_SHORT_LINKS = "true"
ENABLE_ANALYTICS = "false"
ENABLE_BACKUPS = "true"
ENABLE_D1_SYNC = "true"
ENABLE_R2_STORAGE = "true"

# ---------- 预览环境配置 ----------
[env.preview]
name = "y-nav-preview"
compatibility_date = "2025-03-01"

[[env.preview.kv_namespaces]]
binding = "YNAV_WORKER_KV"
id = "43e6854cf0354bf5970054b899dde7d9"

[[env.preview.d1_databases]]
binding = "YNAV_D1_DB"
database_name = "ynav-db"
database_id = "f6e0f916-2855-481f-b6dd-09790f377811"

[[env.preview.r2_buckets]]
binding = "YNAV_R2_BUCKET"
bucket_name = "ynav-storage"

[env.preview.vars]
ENVIRONMENT = "preview"
DEBUG = "true"
APP_NAME = "Y-Nav"
APP_VERSION = "2.0.0"
DOMAIN = "preview.678870.xyz"
R2_S3_ENDPOINT = "https://35e396384ed3981abb800b25f550a695.r2.cloudflarestorage.com/ynav-storage"
ENABLE_SHORT_LINKS = "true"
ENABLE_ANALYTICS = "false"
ENABLE_BACKUPS = "true"
ENABLE_D1_SYNC = "true"
ENABLE_R2_STORAGE = "true"

# ---------- 生产环境配置 ----------
[env.production]
name = "home"
compatibility_date = "2025-03-01"

[[env.production.kv_namespaces]]
binding = "YNAV_WORKER_KV"
id = "43e6854cf0354bf5970054b899dde7d9"

[[env.production.d1_databases]]
binding = "YNAV_D1_DB"
database_name = "ynav-db"
database_id = "f6e0f916-2855-481f-b6dd-09790f377811"

[[env.production.r2_buckets]]
binding = "YNAV_R2_BUCKET"
bucket_name = "ynav-storage"

[env.production.vars]
ENVIRONMENT = "production"
DEBUG = "false"
APP_NAME = "Y-Nav"
APP_VERSION = "2.0.0"
DOMAIN = "678870.xyz"
R2_S3_ENDPOINT = "https://35e396384ed3981abb800b25f550a695.r2.cloudflarestorage.com/ynav-storage"
ENABLE_SHORT_LINKS = "true"
ENABLE_ANALYTICS = "true"
ENABLE_BACKUPS = "true"
ENABLE_D1_SYNC = "true"
ENABLE_R2_STORAGE = "true"

# ============================================
# 🔐 敏感配置（请在 Cloudflare Dashboard 设置）
# ============================================
# 以下变量不应提交到版本控制，请在 Cloudflare Dashboard -> Workers & Pages -> 设置 -> 变量 中添加：
#
# 1. SYNC_PASSWORD_HASH (必填)
#    - 说明：同步密码的 SHA-256 哈希值
#
# 2. VIEW_PASSWORD_HASH (可选)
#    - 说明：只读密码的 SHA-256 哈希值
#
# 3. D1_DATABASE_ID (可选)
#    - 说明：D1数据库ID，覆盖配置文件中的值
#
# ============================================
# 📦 部署步骤
# ============================================
#
# 1. 构建项目
#    npm run build
#
# 2. 部署到生产环境
#    提交代码触发 CI 自动部署
#
# 3. 本地预览
#    wrangler dev
#
# ============================================
