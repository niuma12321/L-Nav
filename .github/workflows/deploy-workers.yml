# ============================================
# Y-Nav 自动部署到 Cloudflare Workers
# ============================================
# 触发条件:
#   - 推送到 main 分支
#   - 手动触发 (workflow_dispatch)
#
# 前置准备:
#   1. 在 Cloudflare Dashboard 创建 KV 命名空间
#   2. 在 wrangler.toml 中填入 KV Namespace ID
#   3. 在 GitHub Secrets 中添加:
#      - CLOUDFLARE_API_TOKEN: Cloudflare API Token (需要 Workers 权限)
#      - CLOUDFLARE_ACCOUNT_ID: Cloudflare Account ID
#      - SYNC_PASSWORD: (可选) 同步密码
# ============================================

name: Deploy Y-Nav to Cloudflare

on:
  # 1. 推送到 main 分支自动部署
  push:
    branches:
      - main
  # 2. 支持手动触发部署
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm' # 自动缓存 node_modules

      - name: Install dependencies
        run: npm ci # 安装根目录依赖

      - name: Build frontend
        run: npm run build # 构建前端，生成 dist 目录

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          # 核心：不要加 --env，直接用 wrangler.toml 里的 name = "home"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
        env:
          # 注入你的环境变量（如果需要）
          SYNC_PASSWORD: ${{ secrets.SYNC_PASSWORD }}
